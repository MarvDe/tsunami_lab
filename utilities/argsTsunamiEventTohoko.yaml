args:
  - solverName: "fwave"
    formatName: "nc"
    setupName: "tsunamiEvent2d"
    startCoordX: -200000. # global coordinates
    startCoordY: 2500000. # of simulation
    cellSize: 1
    cellx: 10800
    celly: 6000
    endTime: 12 # time in s (needs to be updated)
    stations: "utilities/soma_stations.yml"
    bathymetry:
      - startCoordX: -200000. # global coordinates
        startCoordY: 2500000. # of bathymetry data
        cellSize: 250 # in m
        filePath: "large_data/tohoku_gebco20_ucsb3_250m_bath.nc"
    displacement: 
      - startCoordX: -200000. # global coordinates
        startCoordY: 2500000. # of bathymetry data
        cellSize: 250 # in m
        filePath: "large_data/tohoku_gebco20_ucsb3_250m_displ.nc"