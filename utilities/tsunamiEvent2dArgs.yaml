    formatName: "NONE"
    setupName: "tsunamiEvent2d"
    startCoordX: 0 # global coordinates
    startCoordY: 0 # of simulation
    cellSize: 1
    cellx: 1000
    celly: 1000
    endTime: 20
    stations: ""
    bathymetry:
      - startCoordX: 0 # global coordinates
        startCoordY: 0 # of bathymetry data
        cellSize: 1 # in m
        filePath: "utilities/artificialtsunami_bathymetry_1000.nc"
    displacement: 
      - startCoordX: 0 # global coordinates
        startCoordY: 0 # of bathymetry data
        cellSize: 1 # in m
        filePath: "utilities/artificialtsunami_displ_1000.nc"    