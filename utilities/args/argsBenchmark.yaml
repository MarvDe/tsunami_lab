args:
  - solverName: "fwave"
    formatName: "nc"
    setupName: "artificialTsunami"
    startCoordX: 0 # global coordinates
    startCoordY: 0 # of simulation
    cellSize: 1
    cellx: 1000
    celly: 1000
    endTime: 5 # time in s (needs to be updated)
    stations: ""
    bathymetry:
      - startCoordX: 0 # global coordinates
        startCoordY: 0 # of bathymetry data
        cellSize: 250 # in m
        filePath: ""
    displacement: 
      - startCoordX: 0 # global coordinates
        startCoordY: 0 # of bathymetry data
        cellSize: 0 # in m
        filePath: ""